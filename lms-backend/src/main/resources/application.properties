spring.datasource.url=jdbc:postgresql://localhost:5432/library_management
spring.datasource.username=lms_user
spring.datasource.password=lms_password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

logging.level.org.springframework.security=DEBUG
app.auth.jwt-secret=${JWTSECRET}
app.auth.access-token-minutes=15
app.auth.refresh-token-days=14
app.auth.cookie.secure=false
app.auth.cookie.same-site=Lax
app.auth.allowed-origin=http://localhost:5173
